<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOVISTA Dashboard</title>
    
    <!-- Link to Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Link to Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <i class="fa-solid fa-earth-americas logo-icon"></i>
                <h1>GEOVISTA</h1>
            </div>
            
            <div class="sidebar-section">
                <h2><i class="fa-solid fa-upload"></i> Data Ingestion</h2>
                <div class="upload-tabs">
                    <button class="tab-btn active" data-target="json-form">JSON</button>
                    <button class="tab-btn" data-target="csv-form">CSV</button>
                </div>
                
                <!-- JSON Flow -->
                <form id="json-form" class="upload-form active">
                    <div class="form-group">
                        <label>Latitude *</label>
                        <input type="number" step="any" id="json-lat" required placeholder="Ex: 38.8951">
                    </div>
                    <div class="form-group">
                        <label>Longitude *</label>
                        <input type="number" step="any" id="json-lng" required placeholder="Ex: -77.0364">
                    </div>
                    <div class="form-group">
                        <label>Type *</label>
                        <select id="json-type">
                            <option value="OSINT">OSINT</option>
                            <option value="HUMINT">HUMINT</option>
                            <option value="IMINT">IMINT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="json-desc" rows="3" placeholder="Intelligence details..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="json-status">
                            <option value="unverified">Unverified</option>
                            <option value="verified">Verified</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Image Upload (Optional)</label>
                        <input type="file" id="json-image" accept="image/*">
                    </div>
                    <button type="submit" class="btn-primary">Add Point</button>
                </form>

                <!-- CSV Flow -->
                <form id="csv-form" class="upload-form">
                    <p class="help-text">Upload a CSV containing: latitude, longitude, type, description, status</p>
                    <div class="file-upload-wrapper">
                        <input type="file" id="csv-file" accept=".csv" required>
                        <label for="csv-file" class="file-label">
                            <i class="fa-solid fa-file-csv"></i>
                            <span>Choose CSV file...</span>
                        </label>
                    </div>
                    <button type="submit" class="btn-primary">Upload CSV</button>
                </form>
            </div>

            <div class="sidebar-section border-top">
                <h2><i class="fa-solid fa-filter"></i> Filters</h2>
                
                <div class="filter-group">
                    <label>Intelligence Type</label>
                    <select id="filter-type">
                        <option value="">All Types</option>
                        <option value="OSINT">OSINT</option>
                        <option value="HUMINT">HUMINT</option>
                        <option value="IMINT">IMINT</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Verification Status</label>
                    <select id="filter-status">
                        <option value="">All Statuses</option>
                        <option value="verified">Verified</option>
                        <option value="unverified">Unverified</option>
                    </select>
                </div>
            </div>
            
            <div class="sidebar-legend border-top">
                <h3>Legend</h3>
                <div class="legend-item"><span class="legend-color" style="background:var(--color-osint)"></span> OSINT (Blue)</div>
                <div class="legend-item"><span class="legend-color" style="background:var(--color-humint)"></span> HUMINT (Green)</div>
                <div class="legend-item"><span class="legend-color" style="background:var(--color-imint)"></span> IMINT (Red)</div>
                <div class="legend-item"><span class="legend-icon solid"></span> Verified (Solid)</div>
                <div class="legend-item"><span class="legend-icon transparent"></span> Unverified (Transparent)</div>
            </div>
            
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="map"></div>
        </main>
        
        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
